<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h1>Register</h1>

    <form th:action="@{/register}" method="post" th:object="${request}">
        <input type="text" th:field="*{username}" placeholder="Username" required>
        <input type="password" th:field="*{password}" placeholder="Password" required>
        <input type="text" th:field="*{nama}" placeholder="Nama" required>
        <input type="text" th:field="*{alamat}" placeholder="Alamat" required>

        <button type="submit">Register</button>
    </form>

    <div class="text-center" style="margin-top: 20px;">
        <a th:href="@{/login}">Sudah punya akun? Login</a>
    </div>
</div>

</body>
</html>
